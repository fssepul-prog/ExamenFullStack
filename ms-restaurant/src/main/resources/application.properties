# Puerto anterior: 8083 | Puerto actual: 9083 DEBIDO A DUOC
server.port=9083
spring.application.name=ms-restaurant
spring.datasource.url=jdbc:mysql://localhost:3306/db_restaurant?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
eureka.client.service-url.defaultZone=http://localhost:9761/eureka
eureka.instance.prefer-ip-address=true
management.endpoints.web.exposure.include=health,info
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
