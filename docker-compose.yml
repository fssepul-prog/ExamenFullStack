      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:9761/eureka
      EUREKA_INSTANCE_HOSTNAME: ms-restaurant
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    volumes:
      - ./logs:/logs
    deploy:
