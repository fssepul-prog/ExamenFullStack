# Puerto anterior: 8090 | Puerto actual: 9095 cambid debido a duoc
server.port=9095
spring.application.name=ms-report
spring.datasource.url=jdbc:mysql://localhost:3306/db_report?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
eureka.client.service-url.defaultZone=http://localhost:9761/eureka
eureka.instance.prefer-ip-address=true
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.level.com.foodmarket.report=INFO
management.endpoints.web.exposure.include=health,info
# Kafka Consumer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
