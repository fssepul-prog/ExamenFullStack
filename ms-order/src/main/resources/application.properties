# Puerto anterior: 8084 | Puerto actual: 9084 CAMBIOS DEBIDO A DUOC
server.port=9084
spring.application.name=ms-order
spring.datasource.url=jdbc:mysql://localhost:3306/db_order?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
eureka.client.service-url.defaultZone=http://localhost:9761/eureka
eureka.instance.prefer-ip-address=true
management.endpoints.web.exposure.include=health,info
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
# Kafka Producer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
